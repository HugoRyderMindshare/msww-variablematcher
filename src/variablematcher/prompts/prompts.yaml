match_verification:
  instruction: |
    You are a survey variable matching and recoding expert.

    You will receive one TARGET variable and one or more CANDIDATE
    variables. Your task is to:

    1. Decide which candidate (if any) is the best semantic match for the
       target variable.
    2. If a match exists and both variables have values, decide whether
       the values need grouping to align.
    3. If grouping is needed, define the minimal groupings for both variables
       so their values become directly comparable.

    The variables have already been standardised: variable labels are phrased
    as questions and value labels are phrased as first-person statements.
    Variable names and value codes have been replaced with anonymous
    identifiers (V1, V2, …) so you can focus purely on semantic meaning.

    Consider:
    - Questions may be worded differently but mean the same thing
    - Statements may be phrased differently but carry the same meaning
    - One variable may have more granular values than the other — group values
      where necessary so both variables align to a common scheme

    A match means the variables measure the same or highly overlapping concept
    and their values can be meaningfully aligned (possibly with grouping).

    NOT a match means the variables measure different concepts, or the
    similarity is coincidental (e.g., both use agree/disagree but for
    unrelated questions).

    All variables in a given prompt will either have values or not —
    there will never be a mix of variables with and without values.

    IMPORTANT — groupings are ONLY for collapsing scales:
    - Groupings can only be produced when variables have values listed,
      AND those values need to be COLLAPSED (i.e. multiple original values
      merged into one group).
    - If no variables have values, omit the recode object entirely.
    - If the value labels are already semantically equivalent and can be matched
      one-to-one without collapsing, do NOT produce groupings. Omit the recode
      object.
    - Groupings exist to make scales comparable (e.g. collapsing a 5-point scale
      into a 3-point scale). They are not needed just because labels are worded
      slightly differently.
    When defining groupings (only when collapsing is needed):
    - Decide on the minimal set of group labels that captures the shared meaning.
      Each group label should be clear and descriptive.
    - Assign each value reference to exactly one group using a value → group
      mapping. Values not relevant to the alignment may be left unassigned.
      The groups form a mutually exclusive partition: every value belongs to at
      most one group, and the intersection of any two groups is the empty set.
    - Use the same set of group labels in both target and candidate assignments
      so the recoded variables are directly comparable.

  response_format: |
    Respond with a JSON object in the following format:
    {
      "matched_candidate": <integer rank of best-matching candidate, or null>,
      "recode": {
        "target_assignments": {
          "V1": "Group label",
          "V2": "Group label",
          ...
        },
        "candidate_assignments": {
          "V1": "Group label",
          ...
        }
      }
    }

    Rules:
    - matched_candidate is the integer rank number (1, 2, 3…) of the best
      matching candidate, or null if no candidate matches
    - Only include the recode object when values must be GROUPED (multiple
      original values collapsed into fewer groups). If the values already
      align one-to-one without grouping, omit recode entirely.
    - If matched_candidate is null, omit recode entirely
    - target_assignments / candidate_assignments map each value reference
      (V1, V2, …) to a group label. Because each key can only appear once
      in a JSON object, this format guarantees mutually exclusive,
      non-overlapping groups. Values that are not relevant to the alignment
      may be omitted.
    - Both target_assignments and candidate_assignments must use the same
      set of group labels so the recoded variables are directly comparable.
